services:
  postgres:
    image: postgres:16-alpine
    container_name: careerpods-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: careerpods
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careerpods"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
